<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3730A3"/>
      <stop offset="1" stop-color="#6D5AE6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#1E1B4B" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <!-- Shackle: wide arc suggesting a seat-row / venue arch -->
    <path d="M312 462 L312 400 C312 289.5 401.5 200 512 200 C622.5 200 712 289.5 712 400 L712 462 L628 462 L628 400 C628 335.9 576.1 284 512 284 C447.9 284 396 335.9 396 400 L396 462 Z"
          fill="#FFFFFF"/>
    <!-- Lock body -->
    <rect x="252" y="452" width="520" height="392" rx="96" fill="#FFFFFF"/>
    <!-- Keyhole as pin-drop cutout -->
    <path d="M512 546 C566 546 604 585 604 634 C604 673 580 700 556 730 C536 755 520 778 512 806 C504 778 488 755 468 730 C444 700 420 673 420 634 C420 585 458 546 512 546 Z"
          fill="#3730A3"/>
    <!-- Pin inner dot (white, echoes seat marker) -->
    <circle cx="512" cy="634" r="34" fill="#FFFFFF"/>
  </g>
</svg>
