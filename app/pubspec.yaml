name: venue_lock_v1
description: "VenueLock - Cap attendance at an exact seat count."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.0.0
  qr_flutter: ^4.1.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  intl: ^0.20.0
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  http: ^1.2.2
  mobile_scanner: ^7.2.0
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_v2.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icon/app_icon_v2.png"
    icon_size: 256
  web:
    generate: true
    image_path: "assets/icon/app_icon_v2.png"
    background_color: "#3730A3"
    theme_color: "#3730A3"
