name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install app dependencies
        working-directory: app
        run: flutter pub get

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Rename artifact
        run: cp app/build/app/outputs/flutter-apk/app-release.apk VenueLock.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: VenueLock.apk
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'apk-latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
